# =============================================================================
# DeFi Super-App subgraph manifest
#
# Network values + contract addresses + startBlocks come from your deployment.
# After running ./script/deploy.sh:
#   1. Open deployments/84532.json  (Base Sepolia chainId)
#   2. Replace every "0x000..." address below.
#   3. Set startBlock to the block in which Deploy.s.sol was broadcast.
#   4. Run `npm run codegen && npm run build` (from the subgraph/ dir).
# =============================================================================
specVersion: 1.0.0
description: DeFi Super-App — AMM swaps, lending positions, vault events, achievements.
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum/contract
    name: AMM
    network: base-sepolia
    source:
      address: "0xeD03483511cd41Ba895BE5c04B3AF1a215B58D23"
      abi: AMM
      startBlock: 41629879
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/amm.ts
      entities:
        - Swap
        - LiquidityEvent
        - ProtocolMetric
      abis:
        - name: AMM
          file: ./abis/AMM.json
      eventHandlers:
        - event: Swapped(indexed address,indexed address,uint256,indexed address,uint256)
          handler: handleSwapped
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved

  - kind: ethereum/contract
    name: LendingPool
    network: base-sepolia
    source:
      address: "0xc02E02e7552DAE658725db323c23f727890698dd"
      abi: LendingPool
      startBlock: 41629879
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/lending.ts
      entities:
        - LoanPosition
        - ProtocolMetric
      abis:
        - name: LendingPool
          file: ./abis/LendingPool.json
      eventHandlers:
        - event: CollateralDeposited(indexed address,uint256,uint256)
          handler: handleCollateralDeposited
        - event: CollateralWithdrawn(indexed address,uint256,uint256)
          handler: handleCollateralWithdrawn
        - event: Borrowed(indexed address,uint256,uint256)
          handler: handleBorrowed
        - event: Repaid(indexed address,uint256,uint256,uint256)
          handler: handleRepaid
        - event: Liquidated(indexed address,indexed address,uint256,uint256)
          handler: handleLiquidated
        - event: InterestAccrued(indexed address,uint256,uint256)
          handler: handleInterestAccrued

  - kind: ethereum/contract
    name: YieldVault
    network: base-sepolia
    source:
      address: "0xe6baA064DCFD11bd64c09B2c0af51433270e8771"
      abi: YieldVault
      startBlock: 41629879
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/vault.ts
      entities:
        - VaultEvent
        - ProtocolMetric
      abis:
        - name: YieldVault
          file: ./abis/YieldVault.json
      eventHandlers:
        - event: Deposited(indexed address,indexed address,uint256,uint256)
          handler: handleDeposited
        - event: Withdrawn(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdrawn
        - event: YieldHarvested(indexed address,uint256,uint256)
          handler: handleYieldHarvested

  - kind: ethereum/contract
    name: AchievementNFT
    network: base-sepolia
    source:
      address: "0xCa6f8b712F396c94EF2fdB05320aBBd7602cF5D8"
      abi: AchievementNFT
      startBlock: 41629879
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/nft.ts
      entities:
        - Achievement
        - ProtocolMetric
      abis:
        - name: AchievementNFT
          file: ./abis/AchievementNFT.json
      eventHandlers:
        - event: AchievementMinted(indexed address,indexed uint256,uint8,uint8)
          handler: handleAchievementMinted

  - kind: ethereum/contract
    name: ProtocolGovernor
    network: base-sepolia
    source:
      address: "0x93c023fAe0F268644af1A6e686A6ABc06096688a"
      abi: ProtocolGovernor
      startBlock: 41629879
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/governor.ts
      entities:
        - Proposal
        - ProtocolMetric
      abis:
        - name: ProtocolGovernor
          file: ./abis/ProtocolGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
